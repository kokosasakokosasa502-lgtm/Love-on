<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحة حب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <script>
    const CONFIG = {

      /* --- كلمة السر --- */
      password: "love",

      /* --- اسم الشخص اللي بتبعتهاله/ها --- */
      partnerName: "❤️جــيــكــا❤️",

      /* --- نص صفحة كلمة السر --- */
      lockedTitle:   "جاهزة 🤔",
      lockedSubtitle:"❤️ كل الي هنا هيفضل بيني وبينك طول العمر",
      unlockButton:  "يلا بسرعة افتحي ❤️ 😄",

      /* --- تاريخ أول يوم تعارف (YYYY-MM-DD) --- */
      anniversaryDate: "2024-06-04",
      anniversaryLabel: "اول مرة اتكلمنا ❤️",
      anniversaryMessage: "بداية عمري معاكي ❤️",

      /* --- رسائل الحب الثلاثة --- */
      loveMsg1: "بحبك",
      loveMsg2: "بموت فيكي",
      loveMsg3: "بعشققك",
      loveMsg3Hidden: "وانتي كل حياتي ودنيتي ❤️",   // بتظهر لما تضغط

      /* --- الكويز --- */
      quizTitle: "اختاري اجابة بسرعة",
      quizOptions: [
        { text: "محبتش",   reply: "ولا انا محبتش غيرك ❤️"   },
        { text: "ولا بحب", reply: "ولا هحب قدك ❤️"           },
        { text: "التالت",  reply: "يا روحي انتي ❤️"          },
        { text: "الرابع",  reply: "بعشقك بجد ❤️"             }
      ],

      /* --- الصور (تم إضافة اسم الصورة هنا لتظهر مباشرة) --- */
      photos: [
        { src: "geka1.jpg", caption: "بحبك يا نورعيني ❤️",               gradient: "linear-gradient(135deg,#f472b6,#fb7185)" },
        { src: "geka2.jpg", caption: "كل سنة واحنا مع بعض ❤️ 😉",        gradient: "linear-gradient(135deg,#a855f7,#6366f1)" },
        { src: "geka3.jpg", caption: "الي قاعدة ف قلبي ومرحرحة ❤️ 😄",   gradient: "linear-gradient(135deg,#fb923c,#f43f5e)" }
      ],

      /* --- رسالة الحب --- */
      letterMessage: "ربنا يخليكي ليا ومايحرمنيش منك ابدا يا روح قلبي ❤️",

      /* --- الأغنية: ضع اسم ملف الـ MP3 في نفس المجلد --- */
      songFile: "song.mp3",
      songVolume: 0.5    /* من 0 إلى 1 */
    };
  </script>
  <style>
    /* ====== الألوان الأساسية ====== */
    :root {
      --bg:      #0f0a1e;
      --bg2:     #2d1b69;
      --pink:    #e91e8c;
      --pink2:   #ff69b4;
      --card:    rgba(45,27,105,0.45);
      --border:  rgba(255,105,180,0.2);
      --white:   #f5f5f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(145deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
      color: var(--white);
      overflow-x: hidden;
    }

    /* ====== القلوب الطايرة ====== */
    #hearts-bg {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .heart-particle {
      position: absolute; bottom: -60px;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    .heart-particle svg { display: block; }
    @keyframes floatUp {
      0%   { transform: translateY(0)   scale(.6) rotate(0deg);  opacity:0; }
      10%  { opacity: .55; }
      90%  { opacity: .55; }
      100% { transform: translateY(-110vh) scale(1.2) rotate(40deg); opacity:0; }
    }

    /* ====== الصفحات ====== */
    .page {
      position: relative; z-index: 1;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; width: 100%;
      max-width: 420px; margin: 0 auto;
      padding: 24px; animation: fadeIn .5s ease;
    }
    .page.active { display: flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    /* الصفحة الرئيسية تكون scrollable */
    #page-main {
      justify-content: flex-start;
      padding-bottom: 100px;
      overflow-y: auto;
    }

    /* ====== شاشة التحميل ====== */
    #loading-ring { position: relative; width:130px; height:130px; margin-bottom:28px; }
    #loading-ring svg { width:100%; height:100%; transform: rotate(-90deg); }
    #ring-track { stroke: rgba(255,255,255,.1); }
    #ring-fill  { stroke: var(--pink2); stroke-linecap: round;
                  stroke-dasharray: 377; stroke-dashoffset: 377;
                  transition: stroke-dashoffset .08s linear; }
    #heart-icon {
      position:absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      font-size: 44px;
      animation: heartbeat 1.2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100%{transform:translate(-50%,-50%) scale(1)}
      50%    {transform:translate(-50%,-50%) scale(1.18)}
    }
    .loading-dots { display:flex; gap:8px; margin-top:16px; }
    .dot {
      width:12px; height:12px; border-radius:50%; background:var(--pink2);
      animation: bounce .6s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    /* ====== بطاقة زجاجية ====== */
    .glass {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 0 18px rgba(255,105,180,.12);
    }

    /* ====== الـ Avatar ====== */
    .avatar {
      width:88px; height:88px; border-radius:50%;
      background: var(--card); border: 3px solid rgba(255,105,180,.35);
      box-shadow: 0 0 20px rgba(255,105,180,.2);
      display:flex; align-items:center; justify-content:center;
      font-size:40px; margin-bottom:14px;
    }

    /* ====== input وbutton ====== */
    input[type=password], input[type=text] {
      width:100%; padding:14px 18px;
      background:rgba(30,15,60,.5); border:1.5px solid rgba(255,105,180,.35);
      border-radius:14px; color:#fff; font-family:'Cairo',sans-serif;
      font-size:16px; text-align:center; outline:none;
      transition:border .3s, box-shadow .3s;
    }
    input:focus { border-color:var(--pink2); box-shadow:0 0 12px rgba(255,105,180,.35); }
    input.error  { border-color:#ff3333; box-shadow:0 0 14px rgba(255,0,0,.35);
                   animation: shake .45s both; }
    @keyframes shake {
      10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(3px)}
      30%,50%,70%{transform:translateX(-5px)} 40%,60%{transform:translateX(5px)}
    }

    .btn-main {
      width:100%; padding:14px;
      background:linear-gradient(135deg,var(--pink),var(--pink2));
      border:none; border-radius:14px; color:#fff;
      font-family:'Cairo',sans-serif; font-size:17px; font-weight:700;
      cursor:pointer; box-shadow:0 0 18px rgba(255,105,180,.35);
      transition:transform .15s,box-shadow .2s;
    }
    .btn-main:hover  { transform:scale(1.03); box-shadow:0 0 28px rgba(255,105,180,.5); }
    .btn-main:active { transform:scale(.97); }

    /* ====== العداد ====== */
    .counter-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:10px; width:100%; direction:ltr;
    }
    .counter-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:14px; padding:12px 6px;
      display:flex; flex-direction:column; align-items:center;
    }
    .counter-num { font-size:26px; font-weight:800; color:#fff; }
    .counter-lbl { font-size:11px; color:var(--pink2); margin-top:4px; }

    /* ====== رسائل الحب ====== */
    .love-card {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px; cursor:pointer;
      transition:background .25s, box-shadow .25s;
    }
    .love-card:hover { background:rgba(255,105,180,.08); }
    .love-card .msg-text { font-size:18px; font-weight:700; }
    .hidden-msg {
      display:none; text-align:center; padding:12px 0 4px;
      border-top:1px solid rgba(255,105,180,.2); color:var(--pink2); font-weight:600;
    }
    .hidden-msg.visible { display:block; animation:fadeIn .4s ease; }

    /* ====== الكويز ====== */
    .quiz-grid {
      display:grid; grid-template-columns:repeat(2,1fr); gap:14px; width:100%;
    }
    .quiz-card {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:22px 10px; gap:10px; cursor:pointer; min-height:130px;
      transition: border .25s, box-shadow .25s;
    }
    .quiz-card .quiz-heart { font-size:22px; opacity:.5; transition:opacity .25s; }
    .quiz-card .quiz-label { font-weight:700; font-size:15px; }
    .quiz-card .quiz-reply {
      display:none; font-size:12px; color:var(--pink2); text-align:center; margin-top:4px;
    }
    .quiz-card.selected { border-color:var(--pink2) !important; box-shadow:0 0 22px rgba(255,105,180,.4); }
    .quiz-card.selected .quiz-heart { opacity:1; }
    .quiz-card.selected .quiz-reply { display:block; animation:fadeIn .35s ease; }

    /* ====== الصور ====== */
    .photo-frame {
      width:100%; aspect-ratio:4/3; border-radius:14px;
      background-size:cover; background-position:center;
      display:flex; align-items:center; justify-content:center;
    }
    .photo-placeholder-icon { font-size:48px; opacity:.6; }

    /* ====== الـ Modal ====== */
    #modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.65); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    #modal-overlay.open { display:flex; animation:fadeIn .3s ease; }
    #modal-box {
      width:90vw; max-width:360px; padding:36px 28px;
      display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px;
    }
    .modal-icon {
      width:64px; height:64px; border-radius:50%;
      background:rgba(30,15,60,.7); border:1px solid rgba(255,105,180,.5);
      box-shadow:0 0 20px rgba(255,105,180,.3);
      display:flex; align-items:center; justify-content:center; font-size:28px;
    }
    .btn-close {
      margin-top:8px; padding:10px 28px;
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
      border-radius:99px; color:#fff; font-family:'Cairo',sans-serif;
      font-size:15px; cursor:pointer; transition:background .2s;
    }
    .btn-close:hover { background:rgba(255,255,255,.2); }

    /* ====== زر الرسالة العائم ====== */
    #btn-letter {
      position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
      z-index:50; padding:14px 32px; border-radius:99px;
      display:flex; align-items:center; gap:10px;
      font-size:17px; font-weight:700;
      box-shadow:0 10px 30px rgba(255,105,180,.45);
    }

    /* ====== قسم عام ====== */
    section { width:100%; margin-bottom:40px; }
    .section-title {
      text-align:center; font-size:18px; font-weight:800;
      margin-bottom:18px;
    }
    .pill {
      display:inline-block; padding:8px 22px;
      background:var(--card); border:1px solid var(--border); border-radius:99px;
    }
    .date-pill {
      display:flex; align-items:center; gap:8px;
      background:rgba(20,10,50,.6); border:1px solid rgba(255,255,255,.08);
      border-radius:99px; padding:8px 20px; font-family:monospace; font-size:15px;
      margin:12px auto;
    }

    /* ====== زر تشغيل الموسيقى ====== */
    #music-btn {
      position:fixed; top:14px; left:14px; z-index:200;
      width:42px; height:42px; border-radius:50%;
      background:rgba(30,15,60,.75); border:1px solid rgba(255,105,180,.4);
      color:var(--pink2); font-size:18px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:box-shadow .2s;
    }
    #music-btn:hover { box-shadow:0 0 14px rgba(255,105,180,.5); }

    /* ====== فاصل ====== */
    .divider { height:1px; background:rgba(255,255,255,.06); margin:8px 0 24px; }
  </style>
</head>
<body>

<div id="hearts-bg"></div>

<button id="music-btn" title="تشغيل/إيقاف الموسيقى">🎵</button>
<audio id="bg-audio" loop></audio>

<div id="modal-overlay">
  <div id="modal-box" class="glass">
    <div class="modal-icon">💌</div>
    <h2 id="modal-name" style="font-size:28px;font-weight:800"></h2>
    <p id="modal-msg" style="font-size:16px;line-height:1.8;color:rgba(255,255,255,.9)"></p>
    <button class="btn-close" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<div class="page active" id="page-loading">
  <div id="loading-ring">
    <svg viewBox="0 0 128 128">
      <circle id="ring-track" cx="64" cy="64" r="60" fill="none" stroke-width="5"/>
      <circle id="ring-fill"  cx="64" cy="64" r="60" fill="none" stroke-width="5"/>
    </svg>
    <div id="heart-icon">❤️</div>
  </div>
  <h1 style="font-size:22px;font-weight:700;margin-bottom:12px">جاري التحميل</h1>
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="page" id="page-password">
  <div class="avatar">👤</div>
  <h1 id="locked-title"  style="font-size:28px;font-weight:800;margin-bottom:10px"></h1>
  <p  id="locked-subtitle" style="text-align:center;color:rgba(255,255,255,.8);line-height:1.7;margin-bottom:32px;padding:0 8px"></p>

  <div style="width:100%;display:flex;flex-direction:column;gap:16px">
    <input id="pwd-input" type="password" placeholder="اكتب كلمة السر" />
    <button class="btn-main" id="unlock-btn"></button>
  </div>
</div>

<div class="page" id="page-main">

  <header style="display:flex;flex-direction:column;align-items:center;margin:24px 0 36px">
    <div class="avatar" style="width:68px;height:68px;font-size:30px">💖</div>
    <h2 id="header-name" style="font-size:20px;font-weight:800"></h2>
  </header>

  <section>
    <div style="text-align:center;margin-bottom:14px">
      <span class="pill" id="anniversary-label"></span>
    </div>
    <div class="date-pill" style="width:fit-content;margin:0 auto 22px">
      <span>📅</span>
      <span id="ann-date"></span>
    </div>
    <div class="counter-grid" id="counter-grid"></div>
    <p id="ann-msg" style="text-align:center;margin-top:18px;font-weight:600;color:rgba(255,255,255,.85)"></p>
  </section>

  <div class="divider"></div>

  <section>
    <div class="section-title">اقفي هنا شوية متجريش 😄</div>

    <div class="glass love-card" style="margin-bottom:12px">
      <span>🤍</span>
      <span class="msg-text" id="love-msg1"></span>
      <span>🤍</span>
    </div>

    <div class="glass love-card" style="margin-bottom:12px">
      <span>✨</span>
      <span class="msg-text" id="love-msg2"></span>
      <span>✨</span>
    </div>

    <div class="glass" style="padding:16px 20px;cursor:pointer;margin-bottom:4px"
         onclick="toggleLockMsg(this)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span id="lock-icon">🔒</span>
        <span class="msg-text" id="love-msg3"></span>
        <span id="lock-icon2">🔒</span>
      </div>
      <div class="hidden-msg" id="love-msg3-hidden"></div>
    </div>
  </section>

  <div class="divider"></div>

  <section>
    <div class="section-title" id="quiz-title"></div>
    <div class="quiz-grid" id="quiz-grid"></div>
  </section>

  <div class="divider"></div>

  <section>
    <div class="section-title">ذكرياتنا الحلوة</div>
    <div id="photos-container" style="display:flex;flex-direction:column;gap:20px"></div>
  </section>

  <button class="btn-main glass" id="btn-letter" onclick="openModal()">
    <span>💌</span> رسالة ليكي
  </button>

</div><script>
/* ================================================================
   بناء الصفحة من الـ CONFIG
   ================================================================ */

/* --- القلوب الطايرة --- */
(function buildHearts() {
  const container = document.getElementById('hearts-bg');
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'heart-particle';
    const size = Math.random() * 18 + 10;
    const color = Math.random() > .5 ? '#ff69b4' : '#e91e8c';
    el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>`;
    el.style.left     = Math.random() * 100 + '%';
    el.style.animationDuration = (Math.random() * 12 + 10) + 's';
    el.style.animationDelay   = (Math.random() * 6) + 's';
    container.appendChild(el);
  }
})();

/* --- الأغنية --- */
(function setupAudio() {
  const audio   = document.getElementById('bg-audio');
  const btn     = document.getElementById('music-btn');
  audio.src     = CONFIG.songFile;
  audio.volume  = CONFIG.songVolume;
  let playing   = false;

  btn.addEventListener('click', () => {
    if (playing) { audio.pause(); btn.textContent = '🎵'; playing = false; }
    else         { audio.play().catch(()=>{}); btn.textContent = '⏸'; playing = true; }
  });

  /* محاولة تشغيل تلقائي بعد أول تفاعل من المستخدم */
  document.addEventListener('click', function autoplay() {
    if (!playing) { audio.play().then(()=>{ btn.textContent='⏸'; playing=true; }).catch(()=>{}); }
    document.removeEventListener('click', autoplay);
  }, { once: true });
})();

/* --- صفحة كلمة السر: ملء النصوص --- */
document.getElementById('locked-title').textContent   = CONFIG.lockedTitle;
document.getElementById('locked-subtitle').textContent = CONFIG.lockedSubtitle;
document.getElementById('unlock-btn').textContent      = CONFIG.unlockButton;

/* --- حدث زر كلمة السر --- */
function tryUnlock() {
  const input = document.getElementById('pwd-input');
  if (input.value.toLowerCase() === CONFIG.password.toLowerCase()) {
    showPage('page-main');
  } else {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 550);
  }
}
document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key==='Enter') tryUnlock(); });

/* --- الصفحة الرئيسية: ملء النصوص --- */
document.getElementById('header-name').textContent       = CONFIG.partnerName;
document.getElementById('anniversary-label').textContent = CONFIG.anniversaryLabel;
document.getElementById('ann-date').textContent          = CONFIG.anniversaryDate;
document.getElementById('ann-msg').textContent           = CONFIG.anniversaryMessage;
document.getElementById('love-msg1').textContent         = CONFIG.loveMsg1;
document.getElementById('love-msg2').textContent         = CONFIG.loveMsg2;
document.getElementById('love-msg3').textContent         = CONFIG.loveMsg3;
document.getElementById('love-msg3-hidden').textContent  = CONFIG.loveMsg3Hidden;
document.getElementById('quiz-title').textContent        = CONFIG.quizTitle;
document.getElementById('modal-name').textContent        = CONFIG.partnerName;
document.getElementById('modal-msg').textContent         = CONFIG.letterMessage;

/* --- الكويز --- */
(function buildQuiz() {
  const grid = document.getElementById('quiz-grid');
  CONFIG.quizOptions.forEach((opt, i) => {
    const card = document.createElement('div');
    card.className = 'glass quiz-card';
    card.innerHTML = `<div class="quiz-heart">❤️</div>
                      <div class="quiz-label">${opt.text}</div>
                      <div class="quiz-reply">${opt.reply}</div>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.quiz-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    });
    grid.appendChild(card);
  });
})();

/* --- الصور (تم تعديل هذا الجزء لتظهر الصور كاملة وبحواف دائرية كبيرة) --- */
(function buildPhotos() {
  const container = document.getElementById('photos-container');
  CONFIG.photos.forEach(photo => {
    const wrap = document.createElement('div');
    wrap.className = 'glass';
    wrap.style.padding = '12px';

    if (photo.src) {
      // تم استبدال الفريم القديم بوسام صورة حقيقي ليعرضها كاملة وبأبعادها الأصلية
      const img = document.createElement('img');
      img.src = photo.src;
      img.style.width = '100%';
      img.style.height = 'auto';
      img.style.borderRadius = '24px'; // حواف دائرية كبيرة وجذابة هنا
      img.style.display = 'block';
      wrap.appendChild(img);
    } else {
      // المربعات الفارغة الملونة الأخرى تظل كما هي بشكلها الافتراضي المتناسق
      const frame = document.createElement('div');
      frame.className = 'photo-frame';
      frame.style.background = photo.gradient;
      frame.innerHTML = `<div class="photo-placeholder-icon">📷</div>`;
      wrap.appendChild(frame);
    }

    const caption = document.createElement('p');
    caption.textContent = photo.caption;
    caption.style.cssText = 'text-align:center;font-weight:600;padding:10px 4px 4px';

    wrap.appendChild(caption);
    container.appendChild(wrap);
  });
})();

/* ================================================================
   العداد الحي
   ================================================================ */
(function startCounter() {
  const labels = ['سنة','شهر','يوم','ساعة','دقيقة','ثانية'];
  const grid   = document.getElementById('counter-grid');
  const boxes  = labels.map(lbl => {
    const box  = document.createElement('div'); box.className = 'counter-box';
    const num  = document.createElement('div'); num.className = 'counter-num'; num.textContent = '0';
    const name = document.createElement('div'); name.className = 'counter-lbl'; name.textContent = lbl;
    box.append(num, name); grid.appendChild(box);
    return num;
  });

  function update() {
    const diff = Date.now() - new Date(CONFIG.anniversaryDate + 'T00:00:00').getTime();
    const s    = Math.floor(diff/1000);
    const mn   = Math.floor(s/60);
    const h    = Math.floor(mn/60);
    const d    = Math.floor(h/24);
    const yr   = Math.floor(d/365);
    const mo   = Math.floor((d%365)/30);
    const dd   = Math.floor((d%365)%30);
    const hh   = h%24, mi=mn%60, ss=s%60;
    [yr,mo,dd,hh,mi,ss].forEach((v,i) => boxes[i].textContent = v);
  }
  update();
  setInterval(update, 1000);
})();

/* ================================================================
   المنطق العام
   ================================================================ */

/* تبديل الصفحات */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(id);
  page.classList.add('active');
  if (id === 'page-main') page.scrollTop = 0;
}

/* فتح/غلق الرسالة الثالثة */
function toggleLockMsg(card) {
  const hidden = card.querySelector('.hidden-msg');
  const locks  = card.querySelectorAll('#lock-icon, #lock-icon2');
  hidden.classList.toggle('visible');
  locks.forEach(l => l.textContent = hidden.classList.contains('visible') ? '🔓' : '🔒');
}

/* modal الرسالة */
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ================================================================
   شاشة التحميل — تبدأ تلقائياً
   ================================================================ */
(function startLoading() {
  const fill  = document.getElementById('ring-fill');
  const total = 377;
  const dur   = 2200; /* مللي ثانية */
  const step  = 20;
  let elapsed = 0;

  const timer = setInterval(() => {
    elapsed += step;
    const pct = Math.min(elapsed / dur, 1);
    fill.style.strokeDashoffset = total - total * pct;

    if (elapsed >= dur) {
      clearInterval(timer);
      setTimeout(() => showPage('page-password'), 400);
    }
  }, step);
})();
</script>
